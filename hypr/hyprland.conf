# ╔══════════════════════════════════════════╗
# ║         CAT OS — Hyprland Config         ║
# ║    dark · cozy · chaotic · cat energy    ║
# ╚══════════════════════════════════════════╝

# ── Monitors ────────────────────────────────
monitor = ,preferred,auto,1

# ── Autostart ───────────────────────────────
exec-once = swww-daemon
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = ~/.config/catOS/cat_thoughts.sh
exec-once = ~/.config/catOS/cat_walk.sh
exec-once = ~/.config/catOS/cat_nudge.sh
exec-once = ~/.config/catOS/cat_interfere.sh

# ── Input ───────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = yes
    }
}

# ── General ─────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(ffb347ff)
    col.inactive_border = rgba(333333aa)
    layout = dwindle
}

# ── Decoration ──────────────────────────────
decoration {
    rounding = 10
    blur {
        enabled = yes
        size = 6
        passes = 2
        new_optimizations = yes
    }
    drop_shadow = yes
    shadow_range = 12
    shadow_render_power = 3
    col.shadow = rgba(0f0f0fcc)
    inactive_opacity = 0.92
    active_opacity = 1.0
}

# ── Animations ──────────────────────────────
animations {
    enabled = yes

    # smooth cat-like movement
    bezier = easeOut, 0.25, 1, 0.5, 1
    bezier = catPounce, 0.34, 1.56, 0.64, 1

    animation = windows,     1, 5,  catPounce, slide
    animation = windowsOut,  1, 4,  easeOut,   slide
    animation = border,      1, 8,  easeOut
    animation = fade,        1, 5,  default
    animation = workspaces,  1, 6,  easeOut,   slidevert
}

# ── Layouts ─────────────────────────────────
dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_is_master = false
}

# ── Gestures ────────────────────────────────
gestures {
    workspace_swipe = yes
    workspace_swipe_fingers = 3
    workspace_swipe_invert = no
}

# ── Misc ────────────────────────────────────
misc {
    disable_hyprland_logo = yes
    disable_splash_rendering = yes
    mouse_move_enables_dpms = yes
    vrr = 0
}

# ──────────────────────────────────────────────
# KEY BINDINGS
# ──────────────────────────────────────────────
$mod = SUPER

# Launch
bind = $mod, Return, exec, kitty
bind = $mod, D,      exec, wofi --show drun
bind = $mod, E,      exec, thunar
bind = $mod, B,      exec, firefox

# Window management
bind = $mod, Q,      killactive
bind = $mod, F,      fullscreen
bind = $mod, V,      togglefloating
bind = $mod, P,      pseudo
bind = $mod SHIFT, J, togglesplit

# Focus movement
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize windows
binde = $mod CTRL, H, resizeactive, -40 0
binde = $mod CTRL, L, resizeactive,  40 0
binde = $mod CTRL, K, resizeactive,  0 -40
binde = $mod CTRL, J, resizeactive,  0  40

# Workspaces 1–9
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Screenshots
bind = ,     Print, exec, grimblast copy area
bind = SHIFT, Print, exec, grimblast copy screen

# Media keys
bindl = , XF86AudioPlay,        exec, playerctl play-pause
bindl = , XF86AudioNext,        exec, playerctl next
bindl = , XF86AudioPrev,        exec, playerctl previous
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Session
bind = $mod SHIFT, E, exec, wlogout
bind = $mod,       L, exec, hyprlock

# Wallpaper cycle
bind = $mod, W, exec, swww img $(find ~/.config/wallpapers -type f | shuf -n 1)

# ── Window Rules ─────────────────────────────
windowrule = float,  class:^(pavucontrol)$
windowrule = float,  class:^(nm-connection-editor)$
windowrule = float,  title:^(Picture-in-Picture)$
windowrule = center, class:^(wofi)$
windowrule = size 600 400, class:^(wofi)$
