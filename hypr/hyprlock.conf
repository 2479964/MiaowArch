# ── hyprlock — cat lock screen ───────────────

general {
    disable_loading_bar = true
    grace = 2
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/wallpapers/current.jpg
    blur_size = 8
    blur_passes = 3
    brightness = 0.5
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(e6e6e6ff)
    font_size = 72
    font_family = JetBrains Mono
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = 🐈 meow
    color = rgba(ffb347cc)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    outer_color = rgba(ffb347ff)
    inner_color = rgba(1a1a1aee)
    font_color = rgba(e6e6e6ff)
    fade_on_empty = yes
    placeholder_text = <span foreground="#aaaaaa">password...</span>
    position = 0, -120
    halign = center
    valign = center
}
