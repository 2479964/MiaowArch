# ── CAT OS — Kitty terminal ───────────────────

# Font
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
font_size        13.0

# Window
window_padding_width 12
background_opacity   0.92
confirm_os_window_close 0

# Colors — dark cozy cat
background            #0f0f0f
foreground            #e6e6e6
selection_background  #ffb34740
selection_foreground  #e6e6e6

# Cursor
cursor                #ffb347
cursor_text_color     #0f0f0f
cursor_blink_interval 0.5
cursor_shape          beam

# Scrollback
scrollback_lines      4000

# Black
color0  #1a1a1a
color8  #333333

# Red
color1  #cc6666
color9  #d98080

# Green
color2  #80a060
color10 #9dbb70

# Yellow / cat orange
color3  #ffb347
color11 #ffc060

# Blue
color4  #5b8dd9
color12 #79a8e0

# Magenta
color5  #a06090
color13 #c080b0

# Cyan
color6  #5b9da0
color14 #70b8bc

# White
color7  #e6e6e6
color15 #ffffff

# Tab bar
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "  {title}  "
active_tab_foreground   #0f0f0f
active_tab_background   #ffb347
inactive_tab_foreground #888888
inactive_tab_background #1a1a1a
